<!DOCTYPE html>

<html lang="de-CH"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Döltschi Time - Präzision &amp; Flow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                    "primary": "#00418f",
                    "on-primary": "#ffffff",
                    "surface": "#f8f9ff",
                    "on-surface": "#0b1c30",
                    "surface-container": "#e5eeff",
                    "outline-variant": "#c2c6d5"
                }
              }
            }
          }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .active-nav-item { background-color: #ffffff; color: #00418f; }
        body { font-family: 'IBM Plex Sans', sans-serif; background-color: #f8f9ff; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-on-surface">
<aside class="fixed h-full left-0 top-0 w-64 bg-surface-container flex flex-col py-6 px-4 gap-4 z-50">
<div class="mb-6 px-2">
<h1 class="text-xl font-bold text-primary">Döltschi Time</h1>
<p class="text-xs text-on-surface-variant uppercase font-semibold">Precision &amp; Flow</p>
</div>
<nav class="flex-1 space-y-1">
<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold active-nav-item">
<span class="material-symbols-outlined">dashboard</span> Dashboard
            </button>
<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 hover:bg-white/50">
<span class="material-symbols-outlined">history</span> Aktivitäten
            </button>
</nav>
<div class="mt-auto px-2 py-4">
<div class="flex items-center gap-2 text-[10px] font-bold text-green-600 uppercase tracking-wider"><span class="material-symbols-outlined text-sm">check_circle</span> Daten lokal gespeichert</div>
</div>
</aside>
<main class="ml-64 flex-1 flex flex-col">
<header class="h-16 px-8 border-b flex justify-between items-center bg-white">
<div class="relative w-96">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
<input class="w-full pl-10 pr-4 py-2 bg-gray-50 border-none rounded-full text-sm" placeholder="Suchen..." type="text"/>
</div>
<div class="flex items-center gap-4"><button class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg border border-gray-200" onclick="const data = localStorage.getItem('doeltschi_time_activities'); const blob = new Blob([data || '[]'], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'doeltschi_time_data.json'; a.click();"><span class="material-symbols-outlined text-sm">download</span> Export</button>
<button class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2" id="addNewEntry">
<span class="material-symbols-outlined text-sm">add</span> Neuer Eintrag
                </button>
<span class="material-symbols-outlined text-gray-500 cursor-pointer">notifications</span>
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-xs">TD</div>
</div>
</header>
<div class="p-8 overflow-y-auto">
<h2 class="text-3xl font-bold mb-6">Dashboard</h2>
<div class="grid grid-cols-3 gap-6 mb-8">
<div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
<p class="text-xs text-gray-500 uppercase font-bold mb-2">Aktive Mitglieder</p>
<h3 class="text-3xl font-bold">24 / 28</h3>
</div>
<div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
<p class="text-xs text-gray-500 uppercase font-bold mb-2">Team Gesundheit</p>
<h3 class="text-3xl font-bold">92%</h3>
</div>
<div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
<p class="text-xs text-gray-500 uppercase font-bold mb-2">Ausstehend</p>
<h3 class="text-3xl font-bold text-red-600">12</h3>
</div>
</div>
<div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
<div class="p-6 border-b border-gray-100 flex justify-between items-center">
<h3 class="font-bold">Neueste Aktivitäten</h3>
<button class="text-primary text-sm font-semibold" onclick="clearData()">Zurücksetzen</button>
</div>
<div class="divide-y divide-gray-100" id="activitiesList">
<!-- Platzhalter für Aktivitäten-Liste -->
<div class="p-6 flex items-center justify-center text-gray-400 text-sm italic">
                        Lade Aktivitäten...
                    </div>
</div>
</div>
</div>
</main>
<script>
        /**
         * Lokale Speicher-Logik (localStorage)
         */
        const STORAGE_KEY = 'doeltschi_time_activities';

        // Hilfsfunktion zum Abrufen der Daten
        function getActivities() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // Hilfsfunktion zum Speichern der Daten
        function saveActivities(activities) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(activities));
            loadActivities();
        }

        /**
         * Logik für 'Neuer Eintrag'
         */
        document.getElementById('addNewEntry').addEventListener('click', () => {
            const activities = getActivities();
            const types = ['Check-in', 'Check-out', 'Pause', 'Meeting'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            
            const newEntry = {
                id: Date.now(),
                user: "Thomas Döltschi",
                type: randomType,
                timestamp: new Date().toISOString(),
                status: "success"
            };

            activities.unshift(newEntry); // Am Anfang einfügen
            saveActivities(activities.slice(0, 50)); // Nur die letzten 50 behalten
        });

        /**
         * Logik zum Laden der Aktivitäten
         */
        function loadActivities() {
            const activitiesList = document.getElementById('activitiesList');
            const activities = getActivities();

            if (activities.length === 0) {
                activitiesList.innerHTML = `
                    <div class="p-6 flex items-center justify-center text-gray-400 text-sm italic">
                        Keine Aktivitäten vorhanden. Erstelle einen neuen Eintrag.
                    </div>
                `;
                return;
            }

            activitiesList.innerHTML = '';
            activities.slice(0, 5).forEach((item) => {
                const date = new Date(item.timestamp);
                const timeString = date.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
                
                const div = document.createElement('div');
                div.className = 'p-6 flex items-center justify-between hover:bg-gray-50 transition-colors';
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined text-xl">
                                ${item.type === 'Check-in' ? 'login' : item.type === 'Check-out' ? 'logout' : 'schedule'}
                            </span>
                        </div>
                        <div>
                            <p class="font-semibold text-sm">${item.user}</p>
                            <p class="text-xs text-gray-500">${item.type}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-medium">${timeString}</p>
                        <p class="text-[10px] text-green-600 font-bold uppercase">Erfolgreich</p>
                    </div>
                `;
                activitiesList.appendChild(div);
            });
        }

        // Hilfsfunktion zum Leeren des Speichers (für die Demo-Zwecke)
        function clearData() {
            if(confirm('Möchten Sie alle lokalen Daten löschen?')) {
                localStorage.removeItem(STORAGE_KEY);
                loadActivities();
            }
        }

        // Initialer Aufruf
        window.addEventListener('DOMContentLoaded', () => {
            loadActivities();
        });
    </script>
</body></html>
